<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Media — $VORTEX</title>
<meta name="description" content="On-chain media verification powered by $VORTEX. Coming soon.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap');
  :root{--bg:#050507;--card:#0c0c12;--accent:#00f0ff;--purple:#c026d3;--text:#e0e0ff;--muted:#8899aa;--border:#1a1a2e}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .container{max-width:560px}
  .icon{font-size:4rem;margin-bottom:1.5rem}
  h1{font-family:'Space Grotesk',sans-serif;font-size:2.4rem;font-weight:700;margin-bottom:1rem}
  .gradient{background:linear-gradient(90deg,#00f0ff,#c026d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  p{color:var(--muted);font-size:1.05rem;line-height:1.7;margin-bottom:2rem}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border:1px solid var(--accent);border-radius:9999px;font-size:.8rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:rgba(0,240,255,.06);margin-bottom:2rem}
  .btn{display:inline-block;padding:14px 28px;border-radius:12px;font-weight:600;font-size:1rem;text-decoration:none;border:1.5px solid var(--border);color:var(--text);transition:all .3s}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,240,255,.05)}
</style>
</head>
<body>
  <div class="container">
    <div class="icon">🌀</div>
    <div class="badge">Coming Soon</div>
    <h1>Media <span class="gradient">Verification</span></h1>
    <p>Upload a photo or video to verify its authenticity against on-chain provenance proofs. Powered by $VORTEX on Solana.</p>
    <p style="font-size:.9rem;">The verification API is currently in private beta. Interested in early access? Reach out via GitHub.</p>
    <a href="/" class="btn">&larr; Back to $VORTEX</a>
  </div>
</body>
</html>
