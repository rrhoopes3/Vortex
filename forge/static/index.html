<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forge — Grok 4.20 Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">THE FORGE</div>
        <div class="subtitle">Grok 4.20 Autonomous Agent</div>
        <div class="sandbox-controls">
            <label class="sandbox-toggle" title="Restrict file/shell access to a directory">
                <input type="checkbox" id="sandbox-toggle" checked>
                <span class="toggle-slider"></span>
                <span class="toggle-label">Sandbox</span>
            </label>
            <input type="text" id="sandbox-path" value="B:/Grok" placeholder="Sandbox directory..." title="Root directory for sandboxed operations">
        </div>
        <div class="status" id="status">Ready</div>
    </header>
    <div class="settings-bar">
        <label class="direct-toggle" title="Skip the multi-agent planner and send task straight to executor">
            <input type="checkbox" id="direct-toggle">
            <span class="toggle-slider"></span>
            <span class="toggle-label">Direct Mode</span>
        </label>
        <div class="agent-control" id="agent-control">
            <label for="agent-slider">Agents</label>
            <input type="range" id="agent-slider" min="4" max="16" step="4" value="16">
            <span class="agent-count" id="agent-count">16</span>
        </div>
        <div class="model-control">
            <label for="model-select">Model</label>
            <select id="model-select">
                <option value="grok-4.20-experimental-beta-0304-reasoning">4.20 Reasoning  $2/$6</option>
                <option value="grok-4-1-fast-reasoning">4.1 Fast Reasoning  $0.20/$0.50</option>
                <option value="grok-4-1-fast-non-reasoning">4.1 Fast  $0.20/$0.50</option>
                <option value="grok-code-fast-1">Code Fast  $0.20/$1.50</option>
            </select>
        </div>
    </div>
    <main>
        <aside class="sidebar">
            <h3>Task History</h3>
            <div id="history-list"></div>
        </aside>
        <section class="chat-area">
            <div class="messages" id="messages">
                <div class="msg status">
                    The Forge is ready. Describe a task and the 16-agent planner will research and strategize, then the executor will carry it out with tools.
                </div>
            </div>
            <div class="input-bar">
                <input type="text" id="task-input" placeholder="Describe a task for The Forge..." autofocus>
                <button id="submit-btn">FORGE</button>
                <button id="kill-btn" class="kill-btn hidden">KILL</button>
            </div>
        </section>
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
