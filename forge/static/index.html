<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forge — Grok 4.20 Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">THE FORGE</div>
        <div class="subtitle">Grok 4.20 Autonomous Agent</div>
        <div class="sandbox-controls">
            <label class="sandbox-toggle" title="Restrict file/shell access to a directory">
                <input type="checkbox" id="sandbox-toggle" checked>
                <span class="toggle-slider"></span>
                <span class="toggle-label">Sandbox</span>
            </label>
            <input type="text" id="sandbox-path" value="" placeholder="Sandbox directory..." title="Root directory for sandboxed operations">
        </div>
        <div class="status" id="status">Ready</div>
    </header>
    <div class="settings-bar">
        <label class="direct-toggle" title="Skip the multi-agent planner and send task straight to executor">
            <input type="checkbox" id="direct-toggle">
            <span class="toggle-slider"></span>
            <span class="toggle-label">Direct Mode</span>
        </label>
        <div class="agent-control" id="agent-control">
            <label for="agent-slider">Agents</label>
            <input type="range" id="agent-slider" min="4" max="16" step="4" value="16">
            <span class="agent-count" id="agent-count">16</span>
        </div>
        <div class="model-control">
            <label for="model-select">Model</label>
            <select id="model-select">
                <option value="">Loading...</option>
            </select>
        </div>
        <div class="cost-ticker" id="cost-ticker" title="Session cost (click to reset)">
            <span class="cost-label">$</span><span class="cost-value" id="cost-value">0.000000</span>
        </div>
        <button id="arena-btn" class="arena-btn" title="Launch BattleBot Arena — two AI teams deathmatch!">ARENA</button>
    </div>
    <!-- Arena model pickers (hidden until arena button clicked) -->
    <div class="arena-setup hidden" id="arena-setup">
        <div class="arena-setup-inner">
            <span class="arena-setup-title">ARENA SETUP</span>
            <div class="arena-team-pick">
                <label class="team-red">RED</label>
                <select id="red-model"></select>
            </div>
            <span class="arena-vs">VS</span>
            <div class="arena-team-pick">
                <label class="team-blue">BLUE</label>
                <select id="blue-model"></select>
            </div>
            <label class="tts-toggle" title="Arena Master commentary read aloud">
                <input type="checkbox" id="tts-toggle">
                <span class="toggle-slider"></span>
                <span class="toggle-label">TTS</span>
            </label>
            <button id="arena-go-btn" class="arena-go-btn">FIGHT!</button>
            <button id="arena-cancel-btn" class="arena-cancel-btn">Cancel</button>
        </div>
    </div>
    <main>
        <aside class="sidebar">
            <h3>Task History</h3>
            <div id="history-list"></div>
        </aside>
        <section class="arena-view hidden" id="arena-view">
            <div class="arena-header">
                <div class="arena-team-info">
                    <span class="team-name team-red">RED TEAM</span>
                    <div class="score-bar"><span class="score-fill score-red" id="score-red"></span></div>
                    <span class="score-num" id="score-red-num">0</span>
                </div>
                <div class="arena-round-info">
                    <span class="round-label" id="round-label">READY</span>
                </div>
                <div class="arena-team-info">
                    <span class="team-name team-blue">BLUE TEAM</span>
                    <div class="score-bar"><span class="score-fill score-blue" id="score-blue"></span></div>
                    <span class="score-num" id="score-blue-num">0</span>
                </div>
            </div>
            <div class="arena-commentary" id="arena-commentary">
                <div class="commentary-text" id="commentary-text">Awaiting Arena Master...</div>
            </div>
            <div class="arena-teams">
                <div class="arena-team-log">
                    <div class="team-log-header team-red">RED TEAM</div>
                    <div class="team-log-content" id="red-log"></div>
                </div>
                <div class="arena-team-log">
                    <div class="team-log-header team-blue">BLUE TEAM</div>
                    <div class="team-log-content" id="blue-log"></div>
                </div>
            </div>
        </section>
        <section class="chat-area">
            <div class="messages" id="messages">
                <div class="msg status">
                    The Forge is ready. Describe a task and the 16-agent planner will research and strategize, then the executor will carry it out with tools.
                </div>
            </div>
            <div class="input-bar">
                <input type="text" id="task-input" placeholder="Describe a task for The Forge..." autofocus>
                <button id="submit-btn">FORGE</button>
                <button id="kill-btn" class="kill-btn hidden">KILL</button>
            </div>
        </section>
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
